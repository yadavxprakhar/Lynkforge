spring.datasource.url=jdbc:postgresql://localhost:5432/url_shortener
spring.datasource.username=prakhar
spring.datasource.password=1234

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# So API error JSON includes the real message (used by the React app for signup/login toasts).
server.error.include-message=always
server.error.include-binding-errors=always

# HS256: plain UTF-8 string, minimum 32 bytes (jjwt weak-key validation). Rotate in production (env var recommended).
jwt.secret=lynkforge-dev-jwt-hmac-secret-at-least-thirty-two-bytes-long
jwt.expiration=172800000

frontend.url=http://localhost:5173

# Razorpay (subscriptions) - set these as env vars in dev/prod
razorpay.keyId=${RAZORPAY_KEY_ID:}
razorpay.keySecret=${RAZORPAY_KEY_SECRET:}
razorpay.webhookSecret=${RAZORPAY_WEBHOOK_SECRET:}

# Plan IDs from Razorpay dashboard (Subscriptions -> Plans)
razorpay.planId.pro.monthly=${RAZORPAY_PLAN_ID_PRO_MONTHLY:}
razorpay.planId.business.monthly=${RAZORPAY_PLAN_ID_BUSINESS_MONTHLY:}

# Logs (optional but useful)
logging.level.org.springframework.security=DEBUG
logging.level.org.url.shortener=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework=DEBUG
logging.level.org.springframework.web.servlet=TRACE